name: Agent Fix

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ALLOWED_TOOLS: >-
    Read,Edit,Write,Glob,Grep,
    Bash(yarn:*),Bash(bundle:exec:*),
    Bash(git:log:*),Bash(git:diff:*),Bash(git:status:*),Bash(git:show:*),
    Bash(git:checkout:*),Bash(git:add:*),Bash(git:commit:*),Bash(git:push -u:*),
    Bash(git:branch:*),Bash(git:rev-parse:*),Bash(git:fetch:*),
    Bash(gh:issue:*),Bash(gh:pr:*),Bash(gh:label:*),
    Bash(agent-device:*),Bash(xcrun:simctl:*),Bash(sips:*),
    Bash(curl:-s http://localhost:*),
    Bash(grep:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(rm:*),
    Bash(kill:*),Bash(ps:*),Bash(lsof:*),Bash(nohup:*),Bash(sleep:*),
    Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),
    Bash(md5sum:*),Bash(ffmpeg:*)

jobs:
  fix:
    runs-on: macos-latest
    if: >-
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'agent-fix'
      ) || (
        github.event.action == 'created' &&
        contains(github.event.comment.body, '/fix') &&
        !github.event.issue.pull_request &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.18.0"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install agent-device
        run: npm install -g agent-device

      - name: Fix issue
        uses: anthropics/claude-code-action@beta
        env:
          ANTHROPIC_BASE_URL: https://proxy.shopify.ai/vendors/anthropic
        with:
          mode: "agent"
          model: claude-opus-4-6
          anthropic_api_key: ${{ secrets.AI_PROXY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: ${{ env.ALLOWED_TOOLS }}
          direct_prompt: |
            You are running on CI (GitHub Actions). There is no human to confirm with — act autonomously.
            Environment: macOS runner with Xcode and iOS simulator. No Android emulator.
            Fix this GitHub issue. Read and follow .claude/skills/fix-github-issue/SKILL.md for the full workflow.
            After fixing, read and follow .claude/skills/raise-pr/SKILL.md to raise a PR.
            CI notes: use default Metro port (8081).
