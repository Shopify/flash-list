name: Agent Triage

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TARGET_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event.label.name == 'agent-triage' &&
      github.event.sender.type != 'Bot'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Build the allowlist with TARGET_NUM pinned into every state-changing
      # command, so the agent can only act on the triggering issue/PR.
      - name: Build allowedTools
        env:
          NUM: ${{ env.TARGET_NUM }}
        run: |
          PATTERNS=(
            "Read"
            "Write"
            "Bash(gh issue list *)"
            "Bash(gh issue view $NUM)"
            "Bash(gh issue view $NUM *)"
            "Bash(gh issue edit $NUM --add-label P0)"
            "Bash(gh issue edit $NUM --add-label P1)"
            "Bash(gh issue edit $NUM --add-label P2)"
            "Bash(gh issue comment $NUM)"
            "Bash(gh issue comment $NUM *)"
            "Bash(gh issue close $NUM)"
            "Bash(gh pr view $NUM)"
            "Bash(gh pr view $NUM *)"
            "Bash(gh pr comment $NUM)"
            "Bash(gh pr comment $NUM *)"
            "Bash(gh pr close $NUM)"
          )
          ( IFS=,; echo "ALLOWED_TOOLS=${PATTERNS[*]}" >> "$GITHUB_ENV" )

      - name: Triage issue
        uses: anthropics/claude-code-action@bf4f0de6fccd1eea7044a5f903fc928aff363134 # v1
        env:
          ANTHROPIC_BASE_URL: https://proxy.shopify.ai/vendors/anthropic
        with:
          anthropic_api_key: ${{ secrets.AI_PROXY_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "${{ env.ALLOWED_TOOLS }}"
            --disallowedTools "Edit,MultiEdit"
          prompt: |
            Read `.claude/prompts/agent-triage.md` before doing anything else and follow it for the entire
            session. It contains the security rules, scope limits, per-event permissions, and feedback
            requirements that govern this run.

            EVENT TYPE: ${{ github.event_name }}
            TARGET NUMBER: #${{ env.TARGET_NUM }}

      - name: Upload agent feedback
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-feedback-triage-${{ github.event.issue.number || github.event.pull_request.number }}
          path: /tmp/agent-feedback.md
          if-no-files-found: ignore
